<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agency Solutions LIVE — Graphic Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@700;800;900&family=Montserrat:wght@700;800;900&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script type="module">
import { removeBackground } from 'https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.5.5/+esm';
window.imglyRemoveBackground = removeBackground;
console.log('Background removal library loaded, type:', typeof removeBackground);
</script>
<style>
:root {
  --red: #B0251E;
  --dark-red: #8F1E18;
  --black: #111111;
  --soft-black: #1A1A1A;
  --white: #FFFFFF;
  --off-white: #F7F7F7;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Open Sans', sans-serif;
  background: linear-gradient(135deg, #0D0D0D 0%, #1A1A1A 60%, #2A0A08 100%);
  min-height: 100vh;
  color: var(--white);
}

/* App Header */
.app-header {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 28px;
  background: var(--soft-black);
  border-bottom: 3px solid var(--red);
}
.app-header h1 {
  font-family: 'Montserrat', sans-serif;
  font-weight: 800;
  font-size: 20px;
  color: var(--white);
}
.app-header h1 span { color: var(--red); }

/* Layout */
.main-grid {
  display: grid;
  grid-template-columns: 420px 1fr;
  gap: 32px;
  padding: 32px;
  max-width: 1600px;
  margin: 0 auto;
}
@media (max-width: 900px) {
  .main-grid {
    grid-template-columns: 1fr;
    padding: 16px;
    gap: 20px;
  }
}

/* Form Panel */
.form-panel {
  background: rgba(26,26,26,0.95);
  border: 1px solid rgba(176,37,30,0.25);
  border-radius: 12px;
  padding: 28px;
  height: fit-content;
}
.form-panel h2 {
  font-family: 'Montserrat', sans-serif;
  font-weight: 800;
  font-size: 18px;
  margin-bottom: 20px;
  color: var(--off-white);
}
.form-section { margin-bottom: 16px; }
.form-section label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: #888;
  margin-bottom: 5px;
}
.form-section input[type="text"],
.form-section input[type="date"],
.form-section input[type="time"],
.form-section input[type="file"] {
  width: 100%;
  padding: 10px 14px;
  background: var(--black);
  border: 1px solid #333;
  border-radius: 6px;
  color: var(--white);
  font-family: 'Open Sans', sans-serif;
  font-size: 14px;
  transition: border-color 0.2s;
}
.form-section input[type="text"]:focus,
.form-section input[type="date"]:focus,
.form-section input[type="time"]:focus {
  outline: none;
  border-color: var(--red);
}
.form-section input[type="date"],
.form-section input[type="time"] {
  color-scheme: dark;
}
.form-section input[type="file"] {
  padding: 8px;
  cursor: pointer;
}
.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.form-divider {
  border: none;
  border-top: 1px solid #333;
  margin: 18px 0;
}
.btn-submit {
  width: 100%;
  padding: 14px;
  background: var(--red);
  color: var(--white);
  font-family: 'Montserrat', sans-serif;
  font-weight: 800;
  font-size: 16px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.2s;
}
.btn-submit:hover { background: var(--dark-red); }
.btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
.status-msg {
  margin-top: 12px;
  font-size: 13px;
  text-align: center;
  min-height: 20px;
}
.status-msg.success { color: #4caf50; }
.status-msg.error { color: #ff5252; }

/* Preview Panel */
.preview-panel { position: relative; }
.preview-panel h2 {
  font-family: 'Montserrat', sans-serif;
  font-weight: 800;
  font-size: 18px;
  margin-bottom: 16px;
  color: var(--off-white);
}
.preview-wrapper {
  width: 100%;
  max-width: 540px;
  aspect-ratio: 1/1;
  overflow: hidden;
  border-radius: 8px;
  border: 1px solid rgba(176,37,30,0.2);
  position: relative;
}
#graphic-preview {
  width: 1080px;
  height: 1080px;
  transform: scale(0.5);
  transform-origin: top left;
  background: linear-gradient(135deg, #0D0D0D 0%, #1A1A1A 60%, #2A0A08 100%);
  position: relative;
  overflow: hidden;
  font-family: 'Open Sans', sans-serif;
}

/* Graphic: Red glow overlay */
#graphic-preview::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at top right, rgba(176,37,30,0.22) 0%, transparent 65%);
  pointer-events: none;
  z-index: 1;
}

/* Section A: Banner */
.gfx-banner {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 110px;
  background: var(--soft-black);
  border-bottom: 3px solid var(--red);
  display: flex;
  align-items: center;
  padding: 0 32px;
  gap: 22px;
  z-index: 10;
}
.gfx-banner-logo {
  position: relative;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}
.gfx-banner-an {
  font-family: 'Bodoni Moda', serif;
  font-weight: 900;
  font-size: 82px;
  color: var(--red);
  line-height: 1;
  letter-spacing: -0.08em;
}
.gfx-banner-network {
  position: absolute;
  left: 50%;
  top: 55%;
  transform: translate(-50%, -50%);
  font-family: 'Open Sans', sans-serif;
  font-weight: 600;
  font-size: 10px;
  color: #ccc;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  white-space: nowrap;
  text-align: center;
  padding-left: 0.6em;
}
.gfx-banner-divider {
  width: 2px;
  height: 60px;
  background: var(--red);
  flex-shrink: 0;
}
.gfx-banner-text {
  display: flex;
  flex-direction: column;
  gap: 0;
}
.gfx-banner-agency {
  font-family: 'Open Sans', sans-serif;
  font-weight: 600;
  font-size: 16px;
  color: #999;
  letter-spacing: 0.3em;
  text-transform: uppercase;
}
.gfx-banner-title {
  font-family: 'Montserrat', sans-serif;
  font-weight: 900;
  font-size: 42px;
  color: var(--white);
  line-height: 1;
  text-transform: uppercase;
}
.gfx-banner-title span { color: var(--red); }

/* Section F: Date badge */
.gfx-date-badge {
  position: absolute;
  top: 120px;
  right: 32px;
  background: var(--red);
  padding: 12px 20px;
  border-radius: 6px;
  font-family: 'Montserrat', sans-serif;
  font-weight: 800;
  font-size: 18px;
  color: var(--white);
  text-transform: uppercase;
  white-space: pre-line;
  text-align: center;
  z-index: 10;
  display: none;
}

/* Section B: Speaker Name */
.gfx-speaker-name {
  position: absolute;
  top: 260px;
  left: 48px;
  right: 500px;
  font-family: 'Montserrat', sans-serif;
  font-weight: 900;
  font-size: 80px;
  color: var(--white);
  text-transform: uppercase;
  line-height: 0.9;
  z-index: 10;
  word-break: break-word;
}

/* Section C: Role */
.gfx-speaker-role {
  position: absolute;
  top: 480px;
  left: 48px;
  right: 500px;
  font-family: 'Open Sans', sans-serif;
  font-weight: 400;
  font-size: 22px;
  color: #888;
  z-index: 10;
}

/* Red rule */
#gfxRedRule {
  position: absolute;
  top: 530px;
  left: 48px;
  height: 3px;
  background: var(--red);
  z-index: 10;
  transition: width 0.2s;
}

/* Section D: Topic */
.gfx-topic {
  position: absolute;
  top: 555px;
  left: 48px;
  right: 500px;
  font-family: 'Montserrat', sans-serif;
  font-weight: 700;
  font-size: 30px;
  font-style: italic;
  color: var(--red);
  z-index: 10;
}

/* Section E: Bullets */
.gfx-bullets {
  position: absolute;
  top: 650px;
  left: 48px;
  right: 500px;
  list-style: none;
  z-index: 10;
}
.gfx-bullets li {
  display: none;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
  font-family: 'Open Sans', sans-serif;
  font-weight: 400;
  font-size: 18px;
  color: var(--white);
}
.gfx-bullets li.visible { display: flex; }
.gfx-bullets li::before {
  content: '';
  flex-shrink: 0;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--red);
}

/* Section G: Photo */
.gfx-photo {
  position: absolute;
  bottom: -20px;
  right: -40px;
  width: 600px;
  z-index: 5;
  display: none;
}
.gfx-photo img {
  width: 100%;
  height: auto;
  display: block;
}

/* Footer */
.gfx-footer {
  position: absolute;
  bottom: 24px;
  left: 0;
  right: 0;
  text-align: center;
  font-family: 'Open Sans', sans-serif;
  font-weight: 600;
  font-size: 14px;
  color: #444;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  z-index: 10;
}
</style>
</head>
<body>

<!-- App Header -->
<header class="app-header">
  <div style="position:relative;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
    <span style="font-family:'Bodoni Moda',serif;font-weight:900;font-size:42px;color:#B0251E;line-height:1;letter-spacing:-0.08em;">AN</span>
    <span style="position:absolute;left:50%;top:55%;transform:translate(-50%,-50%);font-family:'Open Sans',sans-serif;font-weight:600;font-size:5.5px;color:#ccc;letter-spacing:0.22em;text-transform:uppercase;white-space:nowrap;padding-left:0.6em;">AGENCY NETWORK</span>
  </div>
  <h1>Agency <span>Solutions</span> LIVE &mdash; Graphic Builder</h1>
</header>

<div class="main-grid">
  <!-- Form Panel -->
  <div class="form-panel">
    <h2>Speaker Details</h2>
    <form id="speakerForm" onsubmit="handleSubmit(event)">
      <div class="form-row">
        <div class="form-section">
          <label for="speakerFirst">First Name</label>
          <input type="text" id="speakerFirst" autocomplete="off" oninput="updatePreview()">
        </div>
        <div class="form-section">
          <label for="speakerLast">Last Name</label>
          <input type="text" id="speakerLast" autocomplete="off" oninput="updatePreview()">
        </div>
      </div>

      <div class="form-section">
        <label for="speakerRole">Role / Subtitle</label>
        <input type="text" id="speakerRole" autocomplete="off" oninput="updatePreview()">
      </div>

      <hr class="form-divider">

      <div class="form-section">
        <label for="topicTitle">Topic Title</label>
        <input type="text" id="topicTitle" autocomplete="off" oninput="updatePreview()">
      </div>

      <div class="form-section">
        <label>Bullet Points</label>
        <div style="display:flex;flex-direction:column;gap:8px;">
          <input type="text" id="bullet1" autocomplete="off" placeholder="Bullet 1" oninput="updatePreview()">
          <input type="text" id="bullet2" autocomplete="off" placeholder="Bullet 2" oninput="updatePreview()">
          <input type="text" id="bullet3" autocomplete="off" placeholder="Bullet 3" oninput="updatePreview()">
          <input type="text" id="bullet4" autocomplete="off" placeholder="Bullet 4" oninput="updatePreview()">
          <input type="text" id="bullet5" autocomplete="off" placeholder="Bullet 5" oninput="updatePreview()">
          <input type="text" id="bullet6" autocomplete="off" placeholder="Bullet 6" oninput="updatePreview()">
        </div>
      </div>

      <hr class="form-divider">

      <div class="form-row">
        <div class="form-section">
          <label for="callDate">Date</label>
          <input type="date" id="callDate" autocomplete="off" onchange="updatePreview()">
        </div>
        <div class="form-section">
          <label for="callTime">Time <span style="font-weight:400;color:#666;text-transform:none;letter-spacing:0;">(will display as EST)</span></label>
          <input type="time" id="callTime" autocomplete="off" onchange="updatePreview()">
        </div>
      </div>

      <div class="form-section">
        <label for="speakerPhoto">Speaker Photo</label>
        <input type="file" id="speakerPhoto" accept="image/*" onchange="handlePhoto(this)">
        <div style="display:flex;gap:16px;margin-top:8px;">
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:#aaa;cursor:pointer;text-transform:none;letter-spacing:0;">
            <input type="checkbox" id="removeBg" checked> Remove Background
          </label>
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:#aaa;cursor:pointer;text-transform:none;letter-spacing:0;">
            <input type="checkbox" id="flipPhoto" onchange="toggleFlip()"> Flip Image
          </label>
        </div>
      </div>

      <hr class="form-divider">
      <button type="submit" class="btn-submit" id="submitBtn">Generate &amp; Send</button>
      <div class="status-msg" id="statusMsg"></div>
    </form>
  </div>

  <!-- Preview Panel -->
  <div class="preview-panel">
    <h2>Live Preview</h2>
    <div class="preview-wrapper">
      <div id="graphic-preview">
        <!-- A: Banner -->
        <div class="gfx-banner">
          <div class="gfx-banner-logo">
            <span class="gfx-banner-an">AN</span>
            <span class="gfx-banner-network">AGENCY NETWORK</span>
          </div>
          <div class="gfx-banner-divider"></div>
          <div class="gfx-banner-text">
            <div class="gfx-banner-agency">AGENCY</div>
            <div class="gfx-banner-title">SOLUTIONS <span>LIVE</span></div>
          </div>
        </div>

        <!-- F: Date Badge -->
        <div class="gfx-date-badge" id="gfxDateBadge"></div>

        <!-- B: Speaker Name -->
        <div class="gfx-speaker-name" id="gfxSpeakerName"></div>

        <!-- C: Speaker Role -->
        <div class="gfx-speaker-role" id="gfxSpeakerRole"></div>

        <!-- Red Rule -->
        <div id="gfxRedRule" style="width:80px;"></div>

        <!-- D: Topic -->
        <div class="gfx-topic" id="gfxTopic"></div>

        <!-- E: Bullets -->
        <ul class="gfx-bullets" id="gfxBullets">
          <li id="gfxB1"></li>
          <li id="gfxB2"></li>
          <li id="gfxB3"></li>
          <li id="gfxB4"></li>
          <li id="gfxB5"></li>
          <li id="gfxB6"></li>
        </ul>

        <!-- G: Photo -->
        <div class="gfx-photo" id="gfxPhoto">
          <img id="gfxPhotoImg" src="" alt="">
        </div>

        <!-- Footer -->
        <div class="gfx-footer">Connecting Agents &ndash; Inspiring Greatness</div>
      </div>
    </div>
  </div>

<script>
// Google Apps Script Web App URL for email
var GAS_URL = 'https://script.google.com/macros/s/AKfycbyohJrvsw5REXixZbzSuCoSk1aEb5S1zPJylmWFoX9UgQXZ2X1D-oHYxghjoy-assuWyg/exec';

function formatDate(val) {
  if (!val) return '';
  const [y, m, d] = val.split('-').map(Number);
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return months[m - 1] + ' ' + d + ', ' + y;
}

function formatTime(val) {
  if (!val) return '';
  let [h, m] = val.split(':').map(Number);
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return h + ':' + String(m).padStart(2, '0') + ' ' + ampm + ' EST';
}

function titleCase(str) {
  if (!str) return '';
  const lower = ['of','the','and','in','on','at','to','for','a','an','by','with','from','as','or','nor','but','is'];
  return str.split(' ').map(function(word, i) {
    if (i > 0 && lower.indexOf(word.toLowerCase()) !== -1) return word.toLowerCase();
    return word.charAt(0).toUpperCase() + word.slice(1).toLowerCase();
  }).join(' ');
}

function updatePreview() {
  const first = document.getElementById('speakerFirst').value.trim();
  const last = document.getElementById('speakerLast').value.trim();
  const role = document.getElementById('speakerRole').value.trim();
  const topic = document.getElementById('topicTitle').value.trim();
  const dateRaw = document.getElementById('callDate').value;
  const timeRaw = document.getElementById('callTime').value;
  const date = formatDate(dateRaw);
  const time = formatTime(timeRaw);

  // B: Speaker name
  const nameEl = document.getElementById('gfxSpeakerName');
  nameEl.textContent = [first, last].filter(Boolean).join(' ');

  // Red rule matches speaker name width
  const rule = document.getElementById('gfxRedRule');
  if (nameEl.textContent) {
    rule.style.width = Math.min(nameEl.scrollWidth, 580) + 'px';
  } else {
    rule.style.width = '80px';
  }

  // C: Role (title case)
  document.getElementById('gfxSpeakerRole').textContent = titleCase(role);

  // D: Topic (ALL CAPS)
  document.getElementById('gfxTopic').textContent = topic.toUpperCase();

  // F: Date badge
  const badge = document.getElementById('gfxDateBadge');
  if (date || time) {
    badge.textContent = [date, time].filter(Boolean).join('\n');
    badge.style.display = 'block';
  } else {
    badge.style.display = 'none';
  }

  // E: Bullets
  for (let i = 1; i <= 6; i++) {
    const val = document.getElementById('bullet' + i).value.trim();
    const li = document.getElementById('gfxB' + i);
    if (val) {
      li.textContent = val;
      li.classList.add('visible');
    } else {
      li.textContent = '';
      li.classList.remove('visible');
    }
  }
}

async function handlePhoto(input) {
  const file = input.files[0];
  if (!file) return;
  const status = document.getElementById('statusMsg');
  const shouldRemoveBg = document.getElementById('removeBg').checked;

  function showPhoto(src) {
    const img = document.getElementById('gfxPhotoImg');
    img.src = src;
    document.getElementById('gfxPhoto').style.display = 'block';
  }

  // Helper: resize image to max dimension before bg removal to save memory
  function resizeForProcessing(file, maxSize) {
    return new Promise(function(resolve) {
      var img = new Image();
      img.onload = function() {
        var w = img.width, h = img.height;
        if (w <= maxSize && h <= maxSize) { resolve(file); return; }
        var scale = maxSize / Math.max(w, h);
        var c = document.createElement('canvas');
        c.width = Math.round(w * scale);
        c.height = Math.round(h * scale);
        c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
        c.toBlob(function(blob) { resolve(blob); }, 'image/png');
      };
      img.src = URL.createObjectURL(file);
    });
  }

  if (shouldRemoveBg) {
    if (!window.imglyRemoveBackground) {
      status.className = 'status-msg';
      status.textContent = 'Loading background removal AI model... please wait';
      for (let i = 0; i < 60; i++) {
        await new Promise(r => setTimeout(r, 500));
        if (window.imglyRemoveBackground) break;
      }
    }
    if (window.imglyRemoveBackground) {
      status.className = 'status-msg';
      status.textContent = 'Removing background... (first time may take 30-60s to download AI model)';
      try {
        var resized = await resizeForProcessing(file, 1024);
        const blob = await window.imglyRemoveBackground(resized, {
          model: 'small',
          output: { format: 'image/png', quality: 0.8 }
        });
        showPhoto(URL.createObjectURL(blob));
        status.className = 'status-msg success';
        status.textContent = 'Background removed!';
        setTimeout(() => { status.textContent = ''; status.className = 'status-msg'; }, 4000);
      } catch (err) {
        console.error('BG removal error:', err);
        var reader = new FileReader();
        reader.onload = function(e) { showPhoto(e.target.result); };
        reader.readAsDataURL(file);
        status.className = 'status-msg error';
        status.textContent = 'Background removal failed: ' + err.message;
        setTimeout(() => { status.textContent = ''; status.className = 'status-msg'; }, 5000);
      }
    } else {
      var reader = new FileReader();
      reader.onload = function(e) { showPhoto(e.target.result); };
      reader.readAsDataURL(file);
      status.className = 'status-msg error';
      status.textContent = 'Background removal library failed to load. Photo loaded as-is.';
      setTimeout(() => { status.textContent = ''; status.className = 'status-msg'; }, 5000);
    }
  } else {
    var reader = new FileReader();
    reader.onload = function(e) { showPhoto(e.target.result); };
    reader.readAsDataURL(file);
  }
}

function toggleFlip() {
  const img = document.getElementById('gfxPhotoImg');
  if (document.getElementById('flipPhoto').checked) {
    img.style.transform = 'scaleX(-1)';
  } else {
    img.style.transform = 'none';
  }
}

function setMobileScale() {
  const wrapper = document.querySelector('.preview-wrapper');
  if (!wrapper) return;
  const size = wrapper.offsetWidth;
  document.getElementById('graphic-preview').style.transform = 'scale(' + (size / 1080) + ')';
}

function checkMobile() {
  if (window.innerWidth <= 900) {
    setMobileScale();
  } else {
    document.getElementById('graphic-preview').style.transform = 'scale(0.5)';
  }
}

window.addEventListener('resize', checkMobile);
window.addEventListener('load', checkMobile);

// Convert any blob/object URL image to data URL so canvas won't be tainted
function ensureDataUrl(imgEl) {
  return new Promise(function(resolve) {
    if (!imgEl.src || imgEl.src.startsWith('data:')) { resolve(); return; }
    var c = document.createElement('canvas');
    c.width = imgEl.naturalWidth || imgEl.width;
    c.height = imgEl.naturalHeight || imgEl.height;
    c.getContext('2d').drawImage(imgEl, 0, 0);
    try {
      imgEl.src = c.toDataURL('image/png');
    } catch(e) { /* if it fails, continue anyway */ }
    resolve();
  });
}

async function handleSubmit(e) {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const status = document.getElementById('statusMsg');
  btn.disabled = true;
  status.className = 'status-msg';
  status.textContent = 'Preparing graphic...';

  const graphic = document.getElementById('graphic-preview');
  const origTransform = graphic.style.transform;

  // Convert photo to data URL first to avoid tainted canvas
  var photoImg = document.getElementById('gfxPhotoImg');
  if (photoImg.src && !photoImg.src.startsWith('data:')) {
    await ensureDataUrl(photoImg);
    await new Promise(r => setTimeout(r, 200));
  }

  var pngDataUrl, canvas;
  try {
    graphic.style.transform = 'none';
    canvas = await html2canvas(graphic, {
      width: 1080,
      height: 1080,
      scale: 1,
      useCORS: true,
      allowTaint: false,
      backgroundColor: null
    });
    graphic.style.transform = origTransform;
    checkMobile();
    pngDataUrl = canvas.toDataURL('image/png');
  } catch (err) {
    graphic.style.transform = origTransform;
    checkMobile();
    status.className = 'status-msg error';
    status.textContent = 'Error generating graphic: ' + err.message;
    btn.disabled = false;
    return;
  }

  // Download PNG
  var firstName = document.getElementById('speakerFirst').value.trim() || 'speaker';
  var lastName = document.getElementById('speakerLast').value.trim() || 'graphic';
  var filename = firstName + '_' + lastName + '_AgencySolutionsLive';
  var pngLink = document.createElement('a');
  pngLink.download = filename + '.png';
  pngLink.href = pngDataUrl;
  pngLink.click();
  status.textContent = 'PNG downloaded. Generating PDF...';

  await new Promise(r => setTimeout(r, 500));

  // Generate PDF
  try {
    var { jsPDF } = window.jspdf;
    var pdf = new jsPDF({ orientation: 'portrait', unit: 'px', format: [1080, 1080] });
    pdf.addImage(pngDataUrl, 'PNG', 0, 0, 1080, 1080);
    pdf.save(filename + '.pdf');
  } catch (err) {
    console.error('PDF error:', err);
  }

  status.textContent = 'PDF downloaded. Sending email...';

  // Send email via Google Apps Script
  try {
    var emailData = {
      speakerFirst: document.getElementById('speakerFirst').value,
      speakerLast: document.getElementById('speakerLast').value,
      speakerRole: document.getElementById('speakerRole').value,
      topicTitle: document.getElementById('topicTitle').value,
      bullet1: document.getElementById('bullet1').value,
      bullet2: document.getElementById('bullet2').value,
      bullet3: document.getElementById('bullet3').value,
      bullet4: document.getElementById('bullet4').value,
      bullet5: document.getElementById('bullet5').value,
      bullet6: document.getElementById('bullet6').value,
      callDate: formatDate(document.getElementById('callDate').value),
      callTime: formatTime(document.getElementById('callTime').value)
    };

    // Submit via hidden form + iframe (works on all browsers including mobile Safari)
    var iframe = document.createElement('iframe');
    iframe.name = 'gas-submit-' + Date.now();
    iframe.style.display = 'none';
    document.body.appendChild(iframe);

    var form = document.createElement('form');
    form.method = 'POST';
    form.action = GAS_URL;
    form.target = iframe.name;

    for (var key in emailData) {
      var input = document.createElement('input');
      input.type = 'hidden';
      input.name = key;
      input.value = emailData[key];
      form.appendChild(input);
    }

    document.body.appendChild(form);
    form.submit();
    form.remove();
    setTimeout(function() { iframe.remove(); }, 10000);

    status.className = 'status-msg success';
    status.textContent = 'Done! PNG + PDF downloaded and email sent to andrew@agcynetwork.com';
  } catch (err) {
    console.error('Email error:', err);
    status.className = 'status-msg error';
    status.textContent = 'PNG + PDF downloaded but email failed: ' + err.message;
  }
  btn.disabled = false;
}
</script>
</body>
</html>
